- title: "Visualize Geometry Algorithms with Rust"
  url: "to-be-filled"
  summary: |
    I have been learning rust for the last few months, and I've always wanted to learn about geometry algorithms.
    This project implements some algorithms from *Computational Geometry - Algorithms and Applications, Berg et al*
    in rust and gives a visual demo of the algorithms using tools like egui.
